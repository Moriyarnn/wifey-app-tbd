name: wifey-dev

services:
  frontend:
    container_name: wifey-dev-frontend
    build:
      context: ./wifey-app-frontend
      target: dev
    ports:
      - "5174:5173"
    volumes:
      - ./wifey-app-frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_ENV=dev
      - VITE_BACKEND_PORT=3001
    depends_on:
      - backend
    restart: always

  backend:
    container_name: wifey-dev-backend
    build: ./wifey-app-backend
    ports:
      - "3001:3000"
    volumes:
      - ./wifey-app-backend:/app
      - /app/node_modules
      - sqlite_data_dev:/app/data
    environment:
      - NODE_ENV=development
    env_file:
      - ./wifey-app-backend/.env.dev
    restart: always

volumes:
  sqlite_data_dev:
